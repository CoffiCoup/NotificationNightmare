<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OHGo!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      display:flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      background-color: #1c1f81;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      color: rgb(229, 228, 213);
      font-size: 24px;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    /* HERO SECTION */
    .hero {
      background-color: #f0f0f0;
      text-align: center;
      padding: 100px 20px;
      flex:1;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #555;
    }

    .hero button {
      padding: 12px 30px;
      font-size: 16px;
      background-color: #333;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    /* FOOTER */
    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">OHGo!</div>
    <ul>
      <li><a href="#">Home</a></li>
      
      <li><a href="#">Bios</a></li>
      <li><a href="#">Calendar</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- HERO SECTION -->
  <div class="hero">
    <h1>Welcome to OHGo!</h1>
    <p>Access your office hours, anytime.</p>
    <button>Login</button>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 OHGo!. All rights reserved.</p>
  </footer>

</body>
</html>
